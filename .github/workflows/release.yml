name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run porting completion checks
        run: make porting-complete

      - name: Build release binaries
        run: |
          go build -tags='nojpx,nojbig2' -ldflags="-s -w" -o bin/pdfinfo-linux-amd64 ./cmd/pdfinfo
          go build -tags='nojpx,nojbig2' -ldflags="-s -w" -o bin/pdftext-linux-amd64 ./cmd/pdftext
          go build -tags='nojpx,nojbig2' -ldflags="-s -w" -o bin/pdfrender-linux-amd64 ./cmd/pdfrender

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/pdfinfo-linux-amd64
            bin/pdftext-linux-amd64
            bin/pdfrender-linux-amd64
          draft: false
          prerelease: auto
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
