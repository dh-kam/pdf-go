name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build And Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate release tag
        run: |
          if ! [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-[0-9A-Za-z][0-9A-Za-z-]*-[0-9]{6}\.[1-9][0-9]*$ ]]; then
            echo "Invalid release tag: ${GITHUB_REF_NAME}" >&2
            echo "Expected: v<project-semver>-<upstream-slug>-YYYYMM.seq" >&2
            exit 1
          fi

      - name: Run release validation gate
        run: make release-ci

      - name: Build release binaries
        run: make release-build

      - name: Package release assets
        run: ./scripts/package_release_assets.sh "${GITHUB_REF_NAME}" dist

      - name: Upload release build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ github.ref_name }}
          path: dist/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
