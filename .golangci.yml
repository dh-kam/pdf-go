linters:
  disable-all: true
  enable:
    - gofmt
    - goimports
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - typecheck
    - unused
    - gocritic
    - revive
    - stylecheck
    - unconvert
    - nakedret
    - prealloc
    - errcheck

linters-settings:
  govet:
    enable-all: true
    disable:
      - shadow
      - fieldalignment
  errcheck:
    check-type-assertions: true
    check-blank: true
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/dh-kam/pdf-go
  revive:
    rules:
      - name: exported
        severity: warning
      - name: var-naming
        severity: warning
      - name: error-strings
        severity: warning
  staticcheck:
    checks: [ "all" ]
  stylecheck:
    checks: [ "all", "-ST1000", "-ST1003", "-ST1016" ]

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-dirs:
    - tmp
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck

run:
  timeout: 5m
  go: '1.24'
  build-tags:
    - nojpx
    - nojbig2
